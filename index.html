<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE DATA DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="stylesheet" href="app.css">
</head>
<body class="bg-slate-50 text-slate-900 font-inter">

    <!-- Header & Sidebar structure is preserved -->
    <header class="dashboard-header bg-white shadow-sm sticky top-0 z-50">
        <!-- ... (Header Content) ... -->
    </header>

    <div class="dashboard-layout">
        <aside class="sidebar bg-slate-950 text-white">
            <nav>
                <ul>
                    <li class="section-title">MAIN NAVIGATION</li>
                    <li onclick="scrollToSection('documents')">Incoming/Outgoing Documents</li>
                    <li onclick="scrollToSection('volunteers')">Volunteers Database</li>
                    <!-- New Navigation Item -->
                    <li onclick="scrollToSection('trainingsCalendar')">Trainings & Activity Calendar</li>
                    <li onclick="scrollToSection('operations')">Operations Overview</li>
                </ul>
            </nav>
        </aside>

        <main id="main-content" class="main-content">
            
            <!-- (Loader and Global Filters remain here) -->
            <div id="global-loader" class="loader-overlay">
                <div class="modern-loader"></div>
            </div>
            
            <div id="global-filters" class="panel global-filter-panel">
                <!-- ... -->
            </div>

            <!-- PANEL 1: DOCUMENTS remains -->
            <div id="documents" class="panel documents-panel">
                <!-- ... -->
            </div>

            <!-- PANEL 2: VOLUNTEERS remains -->
            <div id="volunteers" class="panel volunteers-panel" style="animation-delay: 0.05s;">
                <!-- ... -->
            </div>

            <!-- NEW PANEL: 3. TRAININGS & ACTIVITY CALENDAR -->
            <div id="trainingsCalendar" class="panel trainings-panel heat-map-panel" style="animation-delay: 0.1s;">
                <div class="panel-header" style="justify-content: flex-start; gap: 16px;">
                    <h2 class="panel-title">TRAINING & ACTIVITY CALENDAR</h2>
                    <div class="header-controls">
                        <select id="calendarYearSelect" class="filter-dropdown" style="width: auto;">
                            <option value="2026">2026</option>
                        </select>
                        <select id="calendarMonthSelect" class="filter-dropdown" style="width: auto;">
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                        <select id="calendarCategorySelect" class="filter-dropdown" style="width: auto;">
                            <option value="all">All Categories</option>
                        </select>
                        <div class="date-range-picker">
                            <input type="date" id="calendarStartDatePicker" class="filter-dropdown" style="width: auto;">
                            <span style="color: #94a3b8;">to</span>
                            <input type="date" id="calendarEndDatePicker" class="filter-dropdown" style="width: auto;">
                        </div>
                    </div>
                </div>
                
                <div class="calendar-container">
                    <div id="modernCalendar" class="calendar-grid">
                        <!-- Modern Heat Map Grid injected here -->
                    </div>
                </div>

                <div class="calendar-legend">
                    <span class="legend-title">Event Frequency:</span>
                    <div class="legend-item"><div class="legend-color freq-1-2"></div>1-2 events</div>
                    <div class="legend-item"><div class="legend-color freq-3-4"></div>3-4 events</div>
                    <div class="legend-item"><div class="legend-color freq-5-plus"></div>5+ events</div>
                </div>

                <!-- Sliding event details panel -->
                <div id="eventDetailsPanel" class="event-details-card">
                    <div class="event-details-header">
                        <h3 id="detailsDateTitle" class="details-date"></h3>
                        <button id="closeDetailsButton" class="close-btn">&times;</button>
                    </div>
                    <div class="event-details-content" id="detailsContentList">
                        <!-- Events populated here -->
                    </div>
                </div>
            </div>

            <!-- PANEL 4, 5, 6: OPERATIONS remaining -->
            <div id="operations" class="multi-chart-row">
                <!-- vehicular, roadside, patient, medical, standby cards ... -->
            </div>
            
            <div class="multi-chart-row other-charts-row">
                <!-- others, clearing, firetruck, hauling, ledvan cards ... -->
            </div>

            <div id="iframeMap" class="panel iframe-panel map-panel" style="animation-delay: 0.3s;">
                <!-- Iframe Map ... -->
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
